<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-aFq/bzH65dt+w6FI2ooMVUpc+21e0SRygnTpmBvdBgSdnuTN7QbdgL+OapgHtvPp" crossorigin="anonymous">
    <link rel="stylesheet" href="css.css">
    <title>PROYECTO</title>
</head>
<body>

    <div class="container-fluid p-4">
        <div class="row">
            <div class="col-lg-6 col-sm-12 p-2 align-items-center">
                <h5 class="label-control text-center" >Ingrese la cantidad de datos a sumar:</h5>
                <div class="w-100 d-flex justify-content-center">
                    <input type="text" class="form-control w-50 me-1 inputCantidad">
                    <button class="btn btn-danger w-25 btnOk">Ok</button>
                </div>

                <div class="row d-none rowResultados w-75 mx-auto">
                    <div class="col-lg-6 col-sm-12 p-2">
                        <div class="containerInputs p-2 overflow-auto" >
                            
                        </div>
                    </div>

                    <div class="col-lg-6 col-sm-12 p-2 d-flex align-items-center containerResultados" >
                        <div class="w-100">
                          <label class="label-control">Valores a sumar en Binario</label>
                          <textarea readonly class="form-control valoresBinario" value="" style="resize: none;"></textarea>
                            <label class="label-control ">Resultado</label>
                            <input readonly class="form-control resultadoNormal">
                            <label class="label-control">Resultado en Binario</label>
                            <textarea readonly class="form-control resultadoBinario" value="" style="resize: none;"></textarea>
                        </div>
                    </div>
                </div>
            </div>


            <div class="col-lg-6 col-sm-12 p-2 d-none colTablas" >
                <table class="table table-striped overflow-auto" >

                    <thead>
                      <tr>
                        <th scope="col">Registros</th>
                      </tr>
                    </thead>

                    <tbody class="tablaBRegistros">
                      <!-- <tr>
                        <td>Mark</td>
                      </tr> -->
                    </tbody>

                  </table>


                  <table class="table table-striped overflow-auto table-responsive">

                    <thead>
                      <tr>
                        <th scope="col">Memoria Y Datos</th>
                      </tr>
                    </thead>

                    <tbody class="tablaBMemoria">
                      <!-- <tr>
                        <td>Mark</td>
                      </tr> -->
                    </tbody>

                  </table>
            </div>

        </div>

    </div>

    
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha2/dist/js/bootstrap.bundle.min.js" integrity="sha384-qKXV1j0HvMUeCBQ+QVp7JcfGl760yU08IQ+GpUo5hlbpg51QRiuqHAJz8+BrxE/N" crossorigin="anonymous"></script>
